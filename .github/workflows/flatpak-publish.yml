# Build Gator as a Flatpak and publish an installable repository on GitHub Pages.
# Builds x86_64 and aarch64 into one ostree repo so ARM devices (e.g. OnePlus 6
# on postmarketOS) install the correct architecture automatically.
#
# After the workflow runs, install with:
#   flatpak remote-add --user --if-not-exists --no-gpg-verify --from gator \
#     https://isyourbrainfoss.github.io/gator/gator.flatpakrepo
#   flatpak install --user gator org.gator.Gator

name: Publish Flatpak

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: flatpak-pages
  cancel-in-progress: true

jobs:
  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Configure Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak repository (x86_64)
        run: |
          flatpak-builder \
            --arch=x86_64 \
            --user \
            --install-deps-from=flathub \
            --disable-rofiles-fuse \
            --force-clean \
            --repo=repo \
            build-dir \
            org.gator.Gator.devel.yml
          tar -cf repo-x86_64.tar repo/

      - name: Upload partial repository
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo-x86_64
          path: repo-x86_64.tar
          retention-days: 7

  build-and-publish:
    name: Build aarch64 and publish
    needs: build-x86_64
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 repository
        uses: actions/download-artifact@v4
        with:
          name: flatpak-repo-x86_64

      - name: Configure Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak repository (aarch64)
        run: |
          tar -xf repo-x86_64.tar
          flatpak-builder \
            --arch=aarch64 \
            --user \
            --install-deps-from=flathub \
            --disable-rofiles-fuse \
            --force-clean \
            --repo=repo \
            build-dir \
            org.gator.Gator.devel.yml

      - name: Finalize repository and bundles
        run: |
          flatpak build-update-repo --generate-static-deltas repo/
          flatpak build-bundle --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo \
            repo org.gator.Gator.x86_64.flatpak org.gator.Gator
          flatpak build-bundle --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo \
            repo org.gator.Gator.aarch64.flatpak org.gator.Gator

      - name: Upload Flatpak bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: org.gator.Gator.flatpak-bundles
          path: |
            org.gator.Gator.x86_64.flatpak
            org.gator.Gator.aarch64.flatpak
          retention-days: 90

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p site
          cp -a repo/. site/
          cp flatpak/gator.flatpakrepo site/gator.flatpakrepo
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4