# Flatpak manifest for Croc GUI
# Build with: flatpak-builder --user --install --force-clean build-dir org.croc.CrocGUI.yml
#
# Notes:
# - Bundles its own croc binary so no host dependency.
# - Uses GNOME runtime (matches libadwaita requirements).
# - Python modules installed via pip in the build.
id: org.croc.CrocGUI
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang  # for building croc (Go)
command: croc-gui
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures  # for QR scan
  - --talk-name=org.freedesktop.Notifications

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  # --- croc (Go) -------------------------------------------------------------
  # Use archive + exact sha for reproducibility (required for Flathub)
  - name: croc
    buildsystem: simple
    build-options:
      env:
        GOPROXY: https://proxy.golang.org
    build-commands:
      - |
        export PATH=/usr/lib/sdk/golang/bin:$PATH
        go build -o $FLATPAK_DEST/bin/croc .
    sources:
      - type: archive
        url: https://github.com/schollz/croc/archive/refs/tags/v10.4.4.tar.gz
        sha256: 33e9160829705942178a017ce055196c4a66c9ef5cdfe8029e840be835e756d4
        strip-components: 1

  # --- Optional Python QR deps (PyGObject + GTK from GNOME runtime) ------
  # Note: pillow and pyzbar may require additional -devel packages on the SDK
  # for a full build. For Flathub this often pulls wheels or we can vendor.
  - name: python-qr-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --verbose --prefix=$FLATPAK_DEST --no-deps --no-build-isolation qrcode[pil] pyzbar
    sources: []

  # --- Croc GUI itself ------------------------------------------------------
  # For local testing with flatpak-builder use type: dir
  # For Flathub / release, switch to:
  #   - type: git
  #     url: https://github.com/.../croc-gui.git
  #     tag: ...
  #     commit: ...
  - name: croc-gui
    buildsystem: meson
    config-opts:
      - -Dprefix=/app
    sources:
      - type: dir
        path: .
    post-install:
      # Ensure the entry point is executable
      - chmod +x /app/bin/croc-gui || true
      - install -Dm644 data/org.croc.CrocGUI.svg /app/share/icons/hicolor/scalable/apps/org.croc.CrocGUI.svg || true

  # Schemas etc are handled in the meson post-install step above
