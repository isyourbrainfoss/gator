# Flatpak manifest for Gator (local development)
#
# Identical to org.gator.Gator.yml except the gator module uses the working tree
# (type: dir) so you can build without pushing or tagging on GitHub.
#
#   flatpak-builder --user --install-deps-from=flathub \
#     --force-clean build-dir org.gator.Gator.devel.yml
#   flatpak run org.gator.Gator
#
# Use org.gator.Gator.yml for release builds and Flathub submission.
id: org.gator.Gator
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: gator
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --talk-name=org.freedesktop.Notifications

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: croc
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        GOPROXY: https://proxy.golang.org
    build-commands:
      - |
        export PATH=/usr/lib/sdk/golang/bin:$PATH
        go build -o $FLATPAK_DEST/bin/croc .
    sources:
      - type: archive
        url: https://github.com/schollz/croc/archive/refs/tags/v10.4.4.tar.gz
        sha256: 33e9160829705942178a017ce055196c4a66c9ef5cdfe8029e840be835e756d4
        strip-components: 1

  - name: zbar
    buildsystem: simple
    build-commands:
      - autoreconf -vfi
      - ./configure --prefix=$FLATPAK_DEST --disable-video --disable-gtk --disable-qt --disable-doc --disable-python --without-dbus --with-dbusconfdir=$FLATPAK_DEST/share/dbus-1/system.d --without-x --without-imagemagick
      - make -j $FLATPAK_BUILDER_N_JOBS
      - make install
      - rm -f $FLATPAK_DEST/lib/python*/site-packages/zbar.* $FLATPAK_DEST/lib/python*/site-packages/zbar-*.egg-info || true
    sources:
      - type: archive
        url: https://github.com/mchehab/zbar/archive/refs/tags/0.23.93.tar.gz
        sha256: 212dfab527894b8bcbcc7cd1d43d63f5604a07473d31a5f02889e372614ebe28
        strip-components: 1

  - name: python-qr-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --verbose --prefix=$FLATPAK_DEST --no-build-isolation "qrcode[pil]" pillow pyzbar
      - ln -sf /app/lib/libzbar.so.0 /app/lib/libzbar.so || true
    sources: []

  - name: gator
    buildsystem: meson
    sources:
      - type: dir
        path: .
    post-install:
      - chmod +x /app/bin/gator || true
      - install -Dm644 data/org.gator.Gator.svg /app/share/icons/hicolor/scalable/apps/org.gator.Gator.svg || true